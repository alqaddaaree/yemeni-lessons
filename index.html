<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فهرس الدروس - مؤسسة صدى السلفية</title>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📚 فهرس الدروس العلمية</h1>
            <p>مؤسسة صدى السلفية لإنتاج الدروس العلمية</p>
            <div class="stats" id="stats">
                <div class="stat-box"><strong id="totalLessons">0</strong> درس</div>
                <div class="stat-box"><strong id="totalSheikhs">0</strong> شيخ</div>
            </div>
        </header>

        <!-- Search & Filters -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 ابحث عن درس أو شيخ (يدعم البحث الضبابي)..." oninput="filterResults()">

            <div class="filters">
                <!-- Sheikh filter -->
                <select id="sheikhFilter" onchange="filterResults()">
                    <option value="">جميع المشايخ</option>
                </select>

                <!-- Category filter -->
                <select id="categoryFilter" onchange="filterResults()">
                    <option value="">جميع التصنيفات</option>
                    <option value="فقه">فقه</option>
                    <option value="عقيدة">عقيدة</option>
                    <option value="تفسير">تفسير</option>
                    <option value="حديث">حديث</option>
                    <option value="سيرة">سيرة</option>
                    <option value="لغة">لغة</option>
                    <option value="أصول">أصول</option>
                    <option value="عام">عام</option>
                </select>

                <!-- Search scope -->
                <div class="filter-group">
                    <label>🔎 في</label>
                    <select id="searchScope" onchange="filterResults()">
                        <option value="all">الكل</option>
                        <option value="title">العنوان فقط</option>
                        <option value="sheikh">الشيخ فقط</option>
                    </select>
                </div>

                <!-- Fuzzy toggle -->
                <div class="filter-group">
                    <label>🎯</label>
                    <select id="fuzzyToggle" onchange="filterResults()">
                        <option value="fuzzy">بحث ضبابي</option>
                        <option value="exact">بحث دقيق</option>
                    </select>
                </div>

                <!-- Lesson count filter -->
                <div class="filter-group">
                    <label>📊</label>
                    <select id="countFilter" onchange="filterResults()">
                        <option value="any">الكل</option>
                        <option value="1-10">1 – 10</option>
                        <option value="11-50">11 – 50</option>
                        <option value="51-100">51 – 100</option>
                        <option value="100+">100+</option>
                        <option value="null">سلسلة</option>
                    </select>
                </div>

                <!-- Sorting -->
                <div class="filter-group">
                    <label>📌</label>
                    <select id="sortOrder" onchange="filterResults()">
                        <option value="lessons-desc">الأكثر دروساً</option>
                        <option value="lessons-asc">الأقل دروساً</option>
                        <option value="date-desc">الأحدث</option>
                        <option value="date-asc">الأقدم</option>
                        <option value="alpha">أبجدياً</option>
                        <option value="relevance">الأكثر تطابقاً</option>
                    </select>
                </div>

                <button class="btn btn-clear" onclick="clearFilters()">🗑️ مسح</button>
            </div>
        </div>

        <!-- Results -->
        <div id="results" class="results">
            <div class="loading">⏳ جاري التحميل...</div>
        </div>

        <!-- Footer -->
        <footer>
            بيانات مستخرجة من قناة
            <a href="https://t.me/alawe1434" target="_blank">الفهرس لمؤسسة صدى SADA السلفية</a>
            &bull; تم التحديث: <span id="updateDate"></span>
            &bull; <span id="resultCount">0</span> نتيجة
        </footer>
    </div>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>
</html>
